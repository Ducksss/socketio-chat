<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MetaLearnerChat — Create Account</title>
    <meta name="description" content="Create a new account on MetaLearnerChat." />
    <link rel="icon" type="image/x-icon" href="images/favicon.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="auth-card">
      <div class="brand">
        <!-- SVG replacing the generic glowing emoji -->
        <svg class="brand-logo" style="width: 48px; height: 48px; margin: 0 auto; display: block; fill: var(--wa-green);" viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 5.92 2 10.76c0 2.25 1.05 4.3 2.8 5.86l-.73 2.7c-.1.35.2.66.54.54l3.1-1c1.28.52 2.72.82 4.25.82 5.52 0 10-3.92 10-8.76S17.52 2 12 2zm0 15.68c-1.35 0-2.65-.26-3.83-.73l-2.07.67.48-1.8c-1.2-1.2-1.92-2.84-1.92-4.66C4.66 7 7.95 3.8 12 3.8s7.34 3.2 7.34 7.36-3.29 6.52-7.34 6.52zM9.55 9.07c-.15.42-.3.9-.3 1.05 0 .2.02.42.12.6.28.52 1.02 1.74 2.15 2.74 1.45 1.28 2.58 1.62 3.12 1.8.2.06.45.04.6-.08.23-.2.52-.64.7-1 .18-.36.18-.68.12-.74-.06-.06-.2-.1-.44-.22s-1.33-.65-1.54-.73c-.2-.08-.34-.1-.5.1-.14.2-.6.73-.72.88-.13.16-.26.18-.5.06-.24-.12-1-.37-1.93-1.2-.73-.65-1.2-1.46-1.34-1.7-.13-.24-.01-.38.1-.5.1-.12.23-.28.34-.43.12-.13.17-.23.23-.38s.04-.28-.02-.4c-.06-.12-.48-1.15-.65-1.58-.17-.4-.36-.35-.5-.36h-.4c-.16 0-.44.06-.66.3zm0 0"/>
        </svg>
        <div class="brand-name">MetaLearnerChat</div>
      </div>

      <div class="card-title">Create an Account</div>

      <form id="userForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Choose a username"
            autocomplete="username"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Create a password"
            autocomplete="new-password"
            required
          />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>
        <div class="form-group">
          <label for="full_name">Full Name</label>
          <input
            type="text"
            id="full_name"
            name="full_name"
            placeholder="Your full name (optional)"
            autocomplete="name"
          />
        </div>
        <button type="submit" class="btn-primary">Sign Up</button>
      </form>

      <div class="auth-footer">
        Already have an account? 
        <a href="http://127.0.0.1/login.html" class="btn-ghost">Log in</a>
      </div>
    </div>

    <script>
      const BaseUrl = "http://127.0.0.1:8000";
      const FrontBaseUrl = "http://127.0.0.1";

      document.getElementById("userForm").addEventListener("submit", function (event) {
        event.preventDefault();
        const formData = new FormData(document.getElementById("userForm"));
        fetch(BaseUrl + "/user/create", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(Object.fromEntries(formData)),
        })
          .then((response) => {
            if (response.ok) return response.json();
            else throw new Error("Failed to create user");
          })
          .then((data) => {
            alert("Account created successfully! You can now log in.");
            window.location.href = FrontBaseUrl + "/login.html";
          })
          .catch((error) => {
            alert(
              "There was a problem creating your account. Username and email must be unique."
            );
          });
      });
    </script>
  </body>
</html>
